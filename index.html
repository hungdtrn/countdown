<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Quattrocento:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="alternate" type="application/json+oembed" href="https://duyhung21.github.io//oembed.json" title="Wedding Countdown" />
  <link rel="alternate" type="text/xml+oembed" href="https://duyhung21.github.io//oembed.json" title="Wedding Countdown" />
</head>
<body>
  <div id="timer"></div>

  <script>
    // Target: 10:00:00 AM on August 2, 2026, Vietnam Time (UTC+7)
    const target = new Date('2026-08-02T03:00:00Z'); // 10:00 AM ICT = 03:00 UTC

    function pad(n) {
      return String(Math.floor(n)).padStart(2, '0');
    }

    function render() {
      const now = new Date();
      const diff = target - now;
      const el = document.getElementById('timer');

      if (diff <= 0) {
        el.innerHTML = '<div class="done">It\'s time!</div>';
        return;
      }

      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);

      const showDays = days > 0;

      el.innerHTML = `
        <div class="countdown">
          ${showDays ? `
            <div class="unit">
              <span class="number">${pad(days)}</span>
              <span class="label">Days</span>
            </div>
            <span class="separator">:</span>
          ` : ''}
          <div class="unit">
            <span class="number">${pad(hours)}</span>
            <span class="label">Hours</span>
          </div>
          <span class="separator">:</span>
          <div class="unit">
            <span class="number">${pad(minutes)}</span>
            <span class="label">Minutes</span>
          </div>
          <span class="separator">:</span>
          <div class="unit">
            <span class="number">${pad(seconds)}</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      `;
    }

    render();
    setInterval(render, 1000);
  </script>
</body>
</html>
