<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown</title>
  <link href="./css2" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Quattrocento', serif;
      color: #f2eeeb;
    }

    .countdown {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
      text-align: center;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .number {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .label {
      font-size: clamp(0.65rem, 2vw, 0.9rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    .separator {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      line-height: 1;
      opacity: 0.4;
      padding-top: 0;
      align-self: flex-start;
    }

    .done {
      font-size: clamp(1.5rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-align: center;
    }
  </style>
</head>
<body style="overscroll-behavior-x: auto;">
  <div id="timer">
        <div class="countdown">
          
            <div class="unit">
              <span class="number">18</span>
              <span class="label">Days</span>
            </div>
            <span class="separator">:</span>
          
          <div class="unit">
            <span class="number">12</span>
            <span class="label">Hours</span>
          </div>
          <span class="separator">:</span>
          <div class="unit">
            <span class="number">49</span>
            <span class="label">Minutes</span>
          </div>
          <span class="separator">:</span>
          <div class="unit">
            <span class="number">54</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      </div>

  <script>
    // Target: 10:00:00 AM on August 2, 2026, Vietnam Time (UTC+7)
    const target = new Date('2026-08-02T03:00:00Z'); // 10:00 AM ICT = 03:00 UTC

    function pad(n) {
      return String(Math.floor(n)).padStart(2, '0');
    }

    function render() {
      const now = new Date();
      const diff = target - now;
      const el = document.getElementById('timer');

      if (diff <= 0) {
        el.innerHTML = '<div class="done">It\'s time!</div>';
        return;
      }

      const days    = Math.floor(diff / 86400000);
      const hours   = Math.floor((diff % 86400000) / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      const seconds = Math.floor((diff % 60000) / 1000);

      const showDays = days > 0;

      el.innerHTML = `
        <div class="countdown">
          ${showDays ? `
            <div class="unit">
              <span class="number">${pad(days)}</span>
              <span class="label">Days</span>
            </div>
            <span class="separator">:</span>
          ` : ''}
          <div class="unit">
            <span class="number">${pad(hours)}</span>
            <span class="label">Hours</span>
          </div>
          <span class="separator">:</span>
          <div class="unit">
            <span class="number">${pad(minutes)}</span>
            <span class="label">Minutes</span>
          </div>
          <span class="separator">:</span>
          <div class="unit">
            <span class="number">${pad(seconds)}</span>
            <span class="label">Seconds</span>
          </div>
        </div>
      `;
    }

    render();
    setInterval(render, 1000);
  </script>


</body></html>
